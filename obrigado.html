<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado - Esperança Através das Lágrimas</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    @font-face { font-family: 'Bodoni'; src: url(./Bodoni.ttf); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { font-family: 'PT Serif', serif; background-color: #e7e5e0; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
    body::before { content: ""; position: fixed; inset: 0; z-index: -1; background-image: url('./assets/Capa Interna 2.png'); background-attachment: fixed; background-size: cover; background-position: center; opacity: 0.5; }

    .thanks-container { max-width: 600px; width: 90%; background: #fcfcf9; padding: 60px 40px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.15); border-radius: 2px; position: relative; opacity: 0; transform: translateY(20px); }
    
    .success-icon { width: 80px; height: 80px; background: #364223; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; color: #fff; box-shadow: 0 10px 20px rgba(54, 66, 35, 0.3); }
    .success-icon svg { width: 40px; height: 40px; }

    .thanks-title { font-size: 1.5rem; color: #1a1a1a; margin-bottom: 5px; font-family: 'PT Serif', serif; line-height: 1.3; }
    .thanks-subtitle { font-family: 'Bodoni', serif; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 3px; color: #ac8541; margin-bottom: 30px; display: block; }
    .thanks-text { font-size: 0.95rem; line-height: 1.8; color: #555; margin: 0 auto 40px; max-width: 480px; }

    .btn { padding: 15px 35px; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; background-color: #1a1a1a; color: #fff; border: 1px solid #1a1a1a; text-decoration: none; border-radius: 2px; transition: all 0.4s; display: inline-block; }
    .btn:hover { background-color: #ac8541; border-color: #ac8541; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(172, 133, 65, 0.2); }

    .divider { width: 50px; height: 1px; background: #C5A059; margin: 15px auto; opacity: 0.5; }

    @media (max-width: 480px) {
      .thanks-container { padding: 40px 20px; width: 95%; margin: 10px; }
      .thanks-title { font-size: 1.4rem; }
      .thanks-subtitle { font-size: 0.9rem; letter-spacing: 2px; }
      .thanks-text { font-size: 0.85rem; margin-bottom: 30px; }
      .btn { padding: 12px 25px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <div class="thanks-container" id="card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    
    <span class="thanks-subtitle">Compra Confirmada!</span>
    <h1 class="thanks-title">Que a sua leitura seja <br> repleta de Esperança.</h1>
    
    <div class="divider"></div>
    
    <p class="thanks-text">
       Caso queira conversar, enviar feedbacks, ou acompanhar o meu trabalho, fique à vontade para me seguir no @bella.isaoliveira_ ou enviar um e-mail para contato@bellaisaoliveira.com 🌿🎨✨.
    </p>
    
    <a href="index.html" class="btn">Voltar ao Início</a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      gsap.to("#card", { opacity: 1, y: 0, duration: 1, ease: "power4.out" });
      gsap.from(".success-icon", { scale: 0.5, opacity: 0, duration: 0.8, delay: 0.3, ease: "back.out(1.7)" });
    });
  </script>

</body>
</html>
